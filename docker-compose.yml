version: '3.9'

services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html   # live-reload для разработки
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: sitedb
      DB_USER: siteuser
      DB_PASS: secret

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: sitedb
      MYSQL_USER: siteuser
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql  # если есть дамп
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: siteuser
      PMA_PASSWORD: secret

volumes:
  db_data:
